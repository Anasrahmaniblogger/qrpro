    <div id="view-logo-studio" class="app-view bg-slate-50 min-h-screen pb-24">
        <!-- Header -->
        <div class="bg-white border-b border-slate-200 sticky top-0 z-30 pt-4 pb-4 px-6 shadow-sm">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <button onclick="navigate('dashboard')" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div>
                        <h2 class="text-xl font-bold text-slate-900">AI Logo Studio</h2>
                        <p class="text-xs text-slate-500">Describe your vision, we'll design it</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto px-4 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Controls (Left) -->
                <div class="lg:col-span-5 space-y-6">
                    <div class="glass-card p-6 bg-white border border-slate-200 rounded-2xl shadow-sm">
                        <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
                            <i class="fas fa-magic text-indigo-500"></i> Generation Prompt
                        </h3>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Company / Brand Name</label>
                                <input type="text" id="logo-brand-name" placeholder="e.g. Acme Corp" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                                <textarea id="logo-prompt" rows="4" placeholder="Describe your logo (e.g., A minimalist geometric fox head in orange and purple gradients, modern tech startup style)" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none resize-none"></textarea>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Style</label>
                                    <select id="logo-style" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none">
                                        <option value="minimalist">Minimalist</option>
                                        <option value="modern">Modern</option>
                                        <option value="abstract">Abstract</option>
                                        <option value="vintage">Vintage</option>
                                        <option value="mascot">Mascot / 3D</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-2">Color Palette</label>
                                    <select id="logo-colors" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none">
                                        <option value="monochrome">Monochrome</option>
                                        <option value="warm">Warm Gradients</option>
                                        <option value="cool">Cool & Techy</option>
                                        <option value="vibrant">Vibrant & Playful</option>
                                    </select>
                                </div>
                            </div>

                            <button id="btn-generate-logo" onclick="generateLogo()" class="w-full mt-4 flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                                <i class="fas fa-wand-magic-sparkles"></i> Generate Logo
                            </button>
                            <p class="text-xs text-center text-slate-500 mt-2">Uses 1 generation credit (simulated)</p>
                        </div>
                    </div>
                </div>

                <!-- Preview (Right) -->
                <div class="lg:col-span-7">
                    <div class="glass-card p-2 bg-white border border-slate-200 rounded-2xl shadow-sm h-full min-h-[500px] flex flex-col">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-xl">
                            <h3 class="font-bold text-slate-900">Preview</h3>
                            <div class="flex gap-2">
                                <button onclick="downloadLogo()" id="btn-download-logo" class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-xl hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm" disabled>
                                    <i class="fas fa-download mr-1.5"></i> Download
                                </button>
                            </div>
                        </div>
                        
                        <div class="flex-grow flex items-center justify-center p-8 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9IiNlMmU4ZjAiLz48L3N2Zz4=')] relative rounded-b-xl overflow-hidden">
                            <!-- Empty State -->
                            <div id="logo-empty-state" class="text-center w-full">
                                <div class="w-24 h-24 bg-indigo-50 text-indigo-300 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 border-2 border-indigo-100 border-dashed">
                                    <i class="fas fa-image"></i>
                                </div>
                                <h4 class="text-lg font-bold text-slate-700 mb-1">No Logo Generated</h4>
                                <p class="text-sm text-slate-500 max-w-xs mx-auto">Describe your vision and click generate to see your AI-powered logo here.</p>
                            </div>

                            <!-- Loading State -->
                            <div id="logo-loading-state" class="text-center hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-10 w-full h-full">
                                <div class="w-16 h-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-6"></div>
                                <h4 class="text-lg font-bold text-slate-800 mb-2">Designing your logo...</h4>
                                <p class="text-sm text-slate-500 max-w-xs mx-auto">Our AI is sketching concepts based on your prompt.</p>
                            </div>

                            <!-- Result State -->
                            <div id="logo-result-state" class="hidden relative group w-full max-w-xs aspect-square bg-white rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center overflow-hidden p-8 transition-transform transform hover:scale-105 mx-auto">
                                <img id="logo-preview-image" src="" alt="Generated Logo" class="w-full h-full object-contain">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
